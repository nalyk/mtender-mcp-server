name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# OIDC trusted publishing: id-token:write is the lever — npm registry verifies
# the GitHub OIDC token and authorizes the publish. contents:write is for the
# auto-create-GitHub-Release step.
permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/mtender-mcp-server
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1.
      # Node 24 ships with npm 10.x, so upgrade explicitly.
      - name: Upgrade npm to >=11.5.1
        run: |
          npm install -g npm@latest
          echo "npm: $(npm --version)"

      - run: npm ci --no-audit --no-fund

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (=$TAG) does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Tag and package.json version both = $PKG"

      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

      # Idempotency guard: makes workflow_dispatch re-runs safe.
      - name: Skip publish if version already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${NAME}@${VERSION} already on npm — skipping publish step."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # No --provenance flag, no NODE_AUTH_TOKEN — OIDC handles both.
      - name: Publish to npm via OIDC
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public

      - name: Create GitHub Release (if missing)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — leaving it alone."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          fi
