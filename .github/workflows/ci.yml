name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".editorconfig"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".editorconfig"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit (moderate severity informational gate)
        # Bumped from `high` to `moderate` so transitive moderates surface in
        # CI logs (e.g. ip-address GHSA-v2v4-37r5-5v8g via SDK→express-rate-limit).
        # Stays `continue-on-error: true` because the moderates are not
        # exploitable in our usage and we don't want CI to block on them.
        run: npm audit --audit-level=moderate
        continue-on-error: true

  smoke-stdio:
    name: stdio handshake smoke
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Smoke initialize + tools/list
        shell: bash
        run: |
          set -euo pipefail
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | timeout 15 node build/index.js)
          echo "$out" | head -c 400
          echo "$out" | grep -q '"protocolVersion":"2025-11-25"'
          echo "$out" | grep -q '"name":"search_tenders"'
          echo "$out" | grep -q '"name":"fetch_tender_document"'

  smoke-http:
    name: streamable-http handshake smoke
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Smoke two sequential POST /mcp requests both succeed
        shell: bash
        env:
          # GHA treats env keys case-insensitively, so we set only the
          # uppercase form and export the lowercase mirror inside the script
          # below (curl + libc honor both, with conventions varying).
          NO_PROXY: "127.0.0.1,localhost"
        run: |
          set -euo pipefail
          export no_proxy="${NO_PROXY}"
          MCP_TRANSPORT=http PORT=8787 HOST=127.0.0.1 LOG_LEVEL=warn \
            node build/index.js &
          MCP_PID=$!
          trap 'kill $MCP_PID 2>/dev/null || true' EXIT
          # Wait for /healthz to be reachable.
          for _ in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8787/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          curl -sSf http://127.0.0.1:8787/healthz | grep -q '"ok":true'

          # First request: must succeed (was OK on the buggy version too).
          R1_HTTP=$(printf '{"jsonrpc":"2.0","id":%d,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' 1 \
            | curl -sS --max-time 10 -o /tmp/r1.body -w '%{http_code}' \
                -X POST http://127.0.0.1:8787/mcp \
                -H 'Content-Type: application/json' \
                -H 'Accept: application/json, text/event-stream' \
                -d @-)
          echo "request 1: HTTP $R1_HTTP"
          test "$R1_HTTP" = "200"
          grep -q 'protocolVersion' /tmp/r1.body

          # Second sequential request: must ALSO succeed. Pre-fix this returned 500.
          R2_HTTP=$(printf '{"jsonrpc":"2.0","id":%d,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' 2 \
            | curl -sS --max-time 10 -o /tmp/r2.body -w '%{http_code}' \
                -X POST http://127.0.0.1:8787/mcp \
                -H 'Content-Type: application/json' \
                -H 'Accept: application/json, text/event-stream' \
                -d @-)
          echo "request 2: HTTP $R2_HTTP"
          test "$R2_HTTP" = "200"
          grep -q 'protocolVersion' /tmp/r2.body

          # GET /mcp must be 405 in stateless mode and carry a JSON-RPC error.
          R3_HTTP=$(curl -sS --max-time 5 -o /tmp/r3.body -w '%{http_code}' http://127.0.0.1:8787/mcp)
          echo "GET /mcp: HTTP $R3_HTTP"
          test "$R3_HTTP" = "405"
          grep -q '"code":-32000' /tmp/r3.body

          # Graceful shutdown: SIGTERM should produce clean exit (code 0).
          kill -TERM $MCP_PID
          wait $MCP_PID
          EXIT=$?
          echo "exit code: $EXIT"
          test "$EXIT" = "0"

  docker:
    name: docker build
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mtender-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
