name: Bug report
description: Something does not work as documented.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the
        repro, the faster the fix. Do **not** include credentials,
        bearer tokens, or anything an MCP host might have logged.
  - type: input
    id: server-version
    attributes:
      label: mtender-mcp-server version
      description: From `package.json` or the `serverInfo` returned by `initialize`.
      placeholder: "3.1.0"
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options: [stdio, "Streamable HTTP", both]
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: MCP host
      description: Claude Desktop, Cursor, custom client, etc.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tool name + arguments, or the exact JSON-RPC payload.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: Include the relevant stderr output (`LOG_LEVEL=debug`).
      render: text
    validations:
      required: true
